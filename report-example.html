<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Report Example - RealtimeSoundMeter.org</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="/css/style.css?v=3" rel="stylesheet">
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-8">
    <div id="reportTemplate" class="bg-white p-8 w-[600px]" style="font-family: sans-serif;">
        <div class="border-4 border-gray-100 rounded-xl p-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -mr-8 -mt-8"></div>
            <div class="absolute bottom-0 left-0 w-24 h-24 bg-green-50 rounded-tr-full -ml-6 -mb-6"></div>
            
            <div class="flex items-center justify-between mb-8 relative z-10">
                <div class="flex items-center gap-3">
                    <img src="logo.svg" alt="Logo" class="h-12 w-auto">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800">Sound Level Report</h2>
                        <p class="text-sm text-gray-500">RealtimeSoundMeter.org</p>
                    </div>
                </div>
                <div class="text-right">
                    <div id="reportDate" class="text-sm font-semibold text-gray-600"></div>
                    <div id="reportTime" class="text-xs text-gray-400"></div>
                </div>
            </div>

            <div class="text-center py-8 mb-8 bg-gray-50 rounded-xl relative z-10">
                <div class="text-sm text-gray-500 mb-4 uppercase tracking-wide">Average Noise Level</div>
                <div class="flex items-baseline justify-center gap-2 mb-6">
                    <span id="reportAvg" class="text-7xl font-bold text-blue-600 leading-none">--</span>
                    <span class="text-3xl text-gray-400 font-medium">dB</span>
                </div>
                <div id="reportStatus" class="inline-flex items-center justify-center px-4 py-1 rounded-full text-sm font-semibold leading-none bg-blue-100 text-blue-800">
                    --
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8 relative z-10">
                <div class="bg-green-50 p-4 rounded-lg text-center">
                    <div class="text-xs text-green-800 mb-1">Minimum Level</div>
                    <div class="text-2xl font-bold text-green-700"><span id="reportMin">--</span> <span class="text-sm">dB</span></div>
                </div>
                <div class="bg-red-50 p-4 rounded-lg text-center">
                    <div class="text-xs text-red-800 mb-1">Maximum Level</div>
                    <div class="text-2xl font-bold text-red-700"><span id="reportMax">--</span> <span class="text-sm">dB</span></div>
                </div>
            </div>

            <div class="border-l-4 border-blue-500 bg-blue-50 p-4 rounded-r-lg mb-6 relative z-10">
                <h3 class="text-sm font-bold text-blue-900 mb-1">Safety Assessment</h3>
                <p id="reportWarning" class="text-xs text-blue-800 leading-relaxed">
                    --
                </p>
            </div>

            <div class="text-center border-t border-gray-200 pt-4 relative z-10">
                <p class="text-xs text-gray-400">
                    Generated by RealtimeSoundMeter.org - Free Online Decibel Meter
                </p>
            </div>
        </div>
    </div>

    <script>
        const scenarios = {
            bedroom: { avg: 34.0, min: 28.0, max: 48.0, date: '2026-03-23', time: '21:30' },
            vacuum: { avg: 74.0, min: 62.0, max: 86.0, date: '2026-03-23', time: '14:10' },
            traffic: { avg: 68.0, min: 55.0, max: 92.0, date: '2026-03-23', time: '08:15' }
        };

        const getWarningHtml = (avgDb) => {
            if (avgDb < 40) return 'Very quiet environment. Safe for unlimited exposure.';
            if (avgDb < 70) return 'Safe noise level. No risk for unlimited exposure time.';
            if (avgDb < 85) return 'Extended exposure may cause fatigue. Limit daily exposure when possible.';
            if (avgDb < 88) return 'Maximum safe exposure: <strong>8 hours</strong>. Use hearing protection for longer.';
            if (avgDb < 91) return 'Maximum safe exposure: <strong>4 hours</strong>. Hearing protection recommended.';
            if (avgDb < 94) return 'Maximum safe exposure: <strong>2 hours</strong>. Wear ear protection!';
            if (avgDb < 97) return 'Maximum safe exposure: <strong>1 hour</strong>. High risk of damage!';
            if (avgDb < 100) return 'Maximum safe exposure: <strong>30 minutes</strong>. Protect your ears!';
            if (avgDb < 103) return 'Maximum safe exposure: <strong>15 minutes</strong>. Dangerous level!';
            if (avgDb < 106) return 'Maximum safe exposure: <strong>7-8 minutes</strong>. Very dangerous!';
            if (avgDb < 109) return 'Maximum safe exposure: <strong>3-4 minutes</strong>. Severe risk!';
            if (avgDb < 112) return 'Maximum safe exposure: <strong>1-2 minutes</strong>. Leave immediately!';
            if (avgDb < 115) return 'Maximum safe exposure: <strong>less than 1 minute</strong>. Immediate danger!';
            return '<strong>IMMEDIATE HEARING DAMAGE RISK!</strong> Leave area now!';
        };

        const setStatusBadge = (avgDb) => {
            const statusEl = document.getElementById('reportStatus');
            if (!statusEl) return;
            if (avgDb < 70) {
                statusEl.textContent = 'Safe Environment';
                statusEl.className = 'inline-flex items-center justify-center px-4 py-1 rounded-full text-sm font-semibold leading-none bg-green-100 text-green-800';
                return;
            }
            if (avgDb < 85) {
                statusEl.textContent = 'Caution Required';
                statusEl.className = 'inline-flex items-center justify-center px-4 py-1 rounded-full text-sm font-semibold leading-none bg-yellow-100 text-yellow-800';
                return;
            }
            statusEl.textContent = 'High Noise Level';
            statusEl.className = 'inline-flex items-center justify-center px-4 py-1 rounded-full text-sm font-semibold leading-none bg-red-100 text-red-800';
        };

        const params = new URLSearchParams(window.location.search);
        const key = (params.get('scenario') || 'bedroom').toLowerCase();
        const s = scenarios[key] || scenarios.bedroom;

        document.getElementById('reportDate').textContent = s.date;
        document.getElementById('reportTime').textContent = s.time;
        document.getElementById('reportAvg').textContent = s.avg.toFixed(1);
        document.getElementById('reportMin').textContent = s.min.toFixed(1);
        document.getElementById('reportMax').textContent = s.max.toFixed(1);
        document.getElementById('reportWarning').innerHTML = getWarningHtml(s.avg);
        setStatusBadge(s.avg);
    </script>
</body>
</html>
