<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Calibration demo chart comparing reference, phone before offset, and phone after offset across four positions">
  <rect width="1200" height="675" fill="#ffffff"/>
  <text x="70" y="96" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="32" font-weight="800" fill="#111827">Calibration Demo (Reference-only)</text>
  <text x="70" y="132" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="16" font-weight="600" fill="#6b7280">Apply a single offset at an anchor point, then verify tracking at other positions.</text>

  <rect x="70" y="170" width="1060" height="440" rx="18" fill="#f8fafc" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="140" y1="560" x2="1080" y2="560" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="140" y1="220" x2="140" y2="560" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="140" y1="470" x2="1080" y2="470" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="140" y1="380" x2="1080" y2="380" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="140" y1="290" x2="1080" y2="290" stroke="#e5e7eb" stroke-width="2"/>

  <text x="130" y="565" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="700" fill="#6b7280" text-anchor="end">60</text>
  <text x="130" y="475" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="700" fill="#6b7280" text-anchor="end">65</text>
  <text x="130" y="385" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="700" fill="#6b7280" text-anchor="end">70</text>
  <text x="130" y="295" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="700" fill="#6b7280" text-anchor="end">75</text>
  <text x="130" y="205" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="700" fill="#6b7280" text-anchor="end">80</text>

  <text x="260" y="590" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="800" fill="#111827" text-anchor="middle">Anchor</text>
  <text x="500" y="590" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="800" fill="#111827" text-anchor="middle">0.5 m</text>
  <text x="740" y="590" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="800" fill="#111827" text-anchor="middle">2 m</text>
  <text x="980" y="590" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="800" fill="#111827" text-anchor="middle">Door open</text>

  <polyline fill="none" stroke="#111827" stroke-width="4" points="260,300 500,248 740,409 980,356"/>
  <circle cx="260" cy="300" r="7" fill="#111827"/>
  <circle cx="500" cy="248" r="7" fill="#111827"/>
  <circle cx="740" cy="409" r="7" fill="#111827"/>
  <circle cx="980" cy="356" r="7" fill="#111827"/>

  <polyline fill="none" stroke="#f59e0b" stroke-width="4" points="260,381 500,329 740,490 980,438"/>
  <circle cx="260" cy="381" r="7" fill="#f59e0b"/>
  <circle cx="500" cy="329" r="7" fill="#f59e0b"/>
  <circle cx="740" cy="490" r="7" fill="#f59e0b"/>
  <circle cx="980" cy="438" r="7" fill="#f59e0b"/>

  <polyline fill="none" stroke="#34d399" stroke-width="4" points="260,300 500,257 740,418 980,362"/>
  <circle cx="260" cy="300" r="7" fill="#34d399"/>
  <circle cx="500" cy="257" r="7" fill="#34d399"/>
  <circle cx="740" cy="418" r="7" fill="#34d399"/>
  <circle cx="980" cy="362" r="7" fill="#34d399"/>

  <rect x="170" y="230" width="450" height="110" rx="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="200" cy="268" r="6" fill="#111827"/>
  <text x="218" y="273" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="700" fill="#111827">Reference</text>
  <circle cx="200" cy="298" r="6" fill="#f59e0b"/>
  <text x="218" y="303" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="700" fill="#111827">Phone before offset</text>
  <circle cx="380" cy="298" r="6" fill="#34d399"/>
  <text x="398" y="303" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="700" fill="#111827">Phone after offset</text>
</svg>
